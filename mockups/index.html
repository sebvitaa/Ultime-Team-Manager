<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultime Team Manager · Mockups de login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#07100b;color:#eafff4;padding:32px 20px 60px}
  header{text-align:center;margin-bottom:28px}
  h1{font-weight:800;letter-spacing:3px;text-transform:uppercase;font-size:20px}
  p.lead{color:#8fb9a3;font-size:13px;margin-top:6px}
  .grid{display:grid;gap:22px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    max-width:1200px;margin:0 auto}
  .card{background:#0c1912;border:1px solid rgba(0,230,118,.18);border-radius:16px;overflow:hidden}
  .frame{position:relative;aspect-ratio:9/16;background:#000;border-bottom:1px solid rgba(255,255,255,.06)}
  iframe{position:absolute;inset:0;width:200%;height:200%;border:0;transform:scale(.5);transform-origin:top left}
  .meta{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .meta b{font-size:13px;letter-spacing:.5px}
  .meta small{display:block;color:#8fb9a3;font-size:11px;margin-top:2px}
  a.abrir{color:#00e676;text-decoration:none;font-size:12px;font-weight:700;white-space:nowrap;
    border:1px solid rgba(0,230,118,.4);padding:6px 10px;border-radius:8px}
  a.abrir:hover{background:rgba(0,230,118,.12)}
</style>
</head>
<body>
  <header>
    <h1>Ultime Team Manager · Mockups de login</h1>
    <p class="lead">5 conceptos de fondo animado, estilo FIFA / FUT. Abre cada uno a pantalla completa para ver el movimiento.</p>
  </header>
  <div class="grid" id="grid"></div>
<script>
  const items=[
    ['mockup-1-estadio-reflectores.html','1 · Estadio con reflectores','Reflectores que barren, público con flashes, césped en perspectiva'],
    ['mockup-2-fut-gradiente.html','2 · FUT gradiente + partículas','Mesh gradient morado/cian animado y partículas flotantes'],
    ['mockup-3-cartas-flotando.html','3 · Cartas FUT flotando','Cartas doradas a la deriva con parallax sobre fondo oscuro'],
    ['mockup-4-neon-toty.html','4 · Neón TOTY','Campo en neón azul, rejilla que pulsa y barrido de luz'],
    ['mockup-4b-neon-pases.html','4b · Neón + pases','La pelota da pases aleatorios por el campo, con estela y pulso en cada llegada'],
    ['mockup-5-estadio-kenburns.html','5 · Estadio Ken Burns + glass','"Foto" de estadio con zoom lento y tarjeta glassmorphism'],
    ['match-1-broadcast.html','Partido 1 · Marcador TV','Barra tipo transmisión: escudos, marcador, reloj en vivo y ticker de eventos'],
    ['match-2-versus.html','Partido 2 · Cara a cara VS','Pantalla dividida en diagonal, escudos grandes, goles y cronómetro central'],
    ['match-3-simulacion.html','Partido 3 · Simulación','Campo con balón, línea de tiempo con goles y relato de eventos en vivo'],
    ['match-final-vs-comentarios.html','Partido ★ VS + comentarios','ELEGIDO: cara a cara sin escudos, cronómetro, marcador y relato en vivo'],
  ];
  const grid=document.getElementById('grid');
  for(const [file,titulo,desc] of items){
    const c=document.createElement('div');c.className='card';
    c.innerHTML=`<div class="frame"><iframe src="${file}" loading="lazy"></iframe></div>
      <div class="meta"><div><b>${titulo}</b><small>${desc}</small></div>
      <a class="abrir" href="${file}" target="_blank">Abrir ↗</a></div>`;
    grid.appendChild(c);
  }
</script>
</body>
</html>
