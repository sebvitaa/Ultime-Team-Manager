<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup 3 · Cartas FUT flotando</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff;
    overflow:hidden;display:grid;place-items:center;min-height:100dvh;
    background:radial-gradient(120% 100% at 50% 0%,#1a1508 0%,#0a0a0d 55%,#050506 100%)}
  .campo-luz{position:fixed;inset:0;z-index:0;
    background:radial-gradient(60% 50% at 50% 40%,rgba(244,201,93,.14),transparent 70%)}

  /* Cartas FUT que flotan al fondo */
  .cartas{position:fixed;inset:0;z-index:1;overflow:hidden}
  .carta{position:absolute;width:120px;height:172px;border-radius:12px;
    background:linear-gradient(160deg,#f7d774,#c69a3b 55%,#8a6a24);
    box-shadow:0 20px 50px rgba(0,0,0,.6);opacity:.55;filter:blur(.4px);
    animation:derivar linear infinite;will-change:transform}
  .carta::before{content:attr(data-r);position:absolute;top:14px;left:14px;
    font-weight:900;font-size:26px;color:#3a2c0a;line-height:.9}
  .carta::after{content:attr(data-p);position:absolute;top:44px;left:15px;
    font-weight:800;font-size:11px;color:#5a4712}
  .carta i{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-style:normal;
    font-size:28px}
  .carta b{position:absolute;bottom:8px;left:0;right:0;text-align:center;
    font-size:9px;letter-spacing:1px;color:#5a4712;font-weight:800}
  @keyframes derivar{
    0%{transform:translateY(30vh) rotate(var(--r)) }
    100%{transform:translateY(-140vh) rotate(calc(var(--r) * -1))}}

  .login{position:relative;z-index:2;width:min(92vw,380px);padding:34px 28px 26px;
    background:rgba(12,11,8,.6);border:1px solid rgba(244,201,93,.3);border-radius:22px;
    backdrop-filter:blur(16px) saturate(140%);box-shadow:0 30px 90px rgba(0,0,0,.65);
    animation:subir .7s cubic-bezier(.2,.8,.2,1) both}
  @keyframes subir{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .marca{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px}
  .escudo{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;font-size:32px;
    background:linear-gradient(145deg,#f4c95d,#b8860b);box-shadow:0 8px 26px rgba(244,201,93,.5);color:#3a2c0a}
  .titulo{font-weight:800;letter-spacing:3px;font-size:15px;text-transform:uppercase;text-align:center}
  .sub{font-size:11px;letter-spacing:2px;color:#f4c95d;font-weight:800;text-transform:uppercase}
  label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#d9c79a;margin:16px 0 6px}
  .in{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,.05);
    border:1px solid rgba(244,201,93,.2);border-radius:12px;transition:.2s}
  .in:focus-within{border-color:#f4c95d;box-shadow:0 0 0 3px rgba(244,201,93,.2)}
  .in input{flex:1;border:0;background:transparent;color:#fff;font-size:15px;outline:0}
  .in input::placeholder{color:rgba(255,255,255,.35)}
  .ojo{cursor:pointer;color:#d9c79a}
  .btn{margin-top:24px;width:100%;padding:14px;border:0;border-radius:12px;cursor:pointer;
    font-weight:900;letter-spacing:2px;text-transform:uppercase;font-size:14px;color:#2a2007;
    background:linear-gradient(145deg,#f7d774,#c69a3b);box-shadow:0 12px 30px rgba(244,201,93,.45);
    transition:transform .15s}
  .btn:hover{transform:translateY(-2px)}
  .demo{margin-top:16px;text-align:center;font-size:11px;color:rgba(255,255,255,.4)}
  .etq{position:fixed;top:14px;left:16px;z-index:3;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:700}
</style>
</head>
<body>
  <div class="campo-luz"></div>
  <div class="cartas" id="cartas"></div>
  <div class="etq">Mockup 3 — Cartas FUT flotando</div>

  <form class="login" onsubmit="return false">
    <div class="marca">
      <div class="escudo">⚽</div>
      <div class="titulo">Ultime Team Manager</div>
      <div class="sub">Inicia sesión</div>
    </div>
    <label>Correo</label>
    <div class="in"><span>📧</span><input type="email" placeholder="tu@correo.com"></div>
    <label>Contraseña</label>
    <div class="in"><span>🔒</span><input id="p3" type="password" placeholder="••••••">
      <span class="ojo" onclick="t('p3')">👁</span></div>
    <button class="btn">Entrar</button>
    <div class="demo">Demo: demo@ultime.com / 123456</div>
  </form>

<script>
  function t(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password'}
  const cont=document.getElementById('cartas');
  const datos=[['91','DEL','⚽'],['88','MED','🎯'],['90','DEF','🛡️'],['85','POR','🧤'],
               ['93','DEL','🔥'],['87','MED','⭐'],['84','DEF','💪'],['89','DEL','⚡']];
  for(let k=0;k<9;k++){
    const d=datos[k%datos.length];
    const c=document.createElement('div');c.className='carta';
    c.dataset.r=d[0];c.dataset.p=d[1];c.innerHTML='<i>'+d[2]+'</i><b>UTM</b>';
    const rot=(Math.random()*30-15).toFixed(1)+'deg';
    c.style.setProperty('--r',rot);
    c.style.left=(Math.random()*92)+'vw';
    const dur=(14+Math.random()*16);
    c.style.animationDuration=dur+'s';
    c.style.animationDelay=(-Math.random()*dur)+'s';
    c.style.transform='scale('+(.7+Math.random()*.7)+')';
    cont.appendChild(c);
  }
</script>
</body>
</html>
