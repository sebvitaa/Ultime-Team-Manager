<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Partido 2 · Cara a cara VS</title>
<style>
  :root{--verde:#2fe27a;--verde2:#12a355;--fondo:#02060a;--texto:#f4f7f9;--gris:#8b98a2;--borde:rgba(255,255,255,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--texto);
    background:var(--fondo);overflow:hidden;min-height:100dvh;display:grid;place-items:center}

  /* Dos mitades enfrentadas con corte diagonal */
  .arena{position:fixed;inset:0;z-index:0}
  .half{position:absolute;top:0;bottom:0;width:60%}
  .half.l{left:0;background:radial-gradient(60% 70% at 30% 40%,#0e3a24,#06140d 70%);
    clip-path:polygon(0 0, 100% 0, 82% 100%, 0 100%)}
  .half.r{right:0;background:radial-gradient(60% 70% at 70% 40%,#3a1a10,#140a06 70%);
    clip-path:polygon(18% 0, 100% 0, 100% 100%, 0 100%)}
  .seam{position:fixed;top:0;bottom:0;left:50%;translate:-50%;width:2px;z-index:1;
    background:linear-gradient(180deg,transparent,rgba(255,255,255,.25),transparent)}
  .vig{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(70% 70% at 50% 45%,transparent 40%,rgba(1,5,3,.6))}

  /* Cronómetro arriba */
  .clockwrap{position:fixed;top:26px;left:50%;translate:-50%;z-index:3;display:flex;align-items:center;gap:8px;
    background:rgba(9,12,11,.8);border:1px solid var(--borde);border-radius:999px;padding:6px 16px}
  .live{width:7px;height:7px;border-radius:50%;background:#ff4d4d;box-shadow:0 0 8px #ff4d4d;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}
  .clock{font-weight:800;font-size:16px;color:var(--verde);font-variant-numeric:tabular-nums;letter-spacing:2px}

  /* Contenido central */
  .stage{position:relative;z-index:2;display:grid;grid-template-columns:1fr auto 1fr;
    align-items:center;gap:min(6vw,48px);width:min(94vw,760px)}
  .side{display:flex;flex-direction:column;align-items:center;gap:14px}
  .crest{width:min(26vw,120px);height:auto;filter:drop-shadow(0 8px 24px rgba(0,0,0,.5))}
  .tname{font-weight:900;font-size:min(6vw,26px);letter-spacing:.5px;text-align:center;line-height:1.05}
  .tsub{font-size:12px;color:var(--gris);letter-spacing:1px;text-transform:uppercase}
  .goals{font-weight:900;font-size:min(16vw,84px);line-height:1;font-variant-numeric:tabular-nums}
  .mid{display:flex;flex-direction:column;align-items:center;gap:8px}
  .vs{display:flex;align-items:center;gap:10px;font-weight:900;font-size:min(9vw,40px);color:var(--gris)}
  .dash{color:#3a4750}
  .lgoals{color:var(--verde)} .rgoals{color:#f79457}
  .rating{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--gris)}
  .rating b{color:var(--texto);font-size:14px}
  .etq{position:fixed;top:12px;left:14px;z-index:4;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(244,247,249,.4);font-weight:700}
</style>
</head>
<body>
  <div class="arena"><div class="half l"></div><div class="half r"></div></div>
  <div class="seam"></div><div class="vig"></div>
  <div class="etq">Partido 2 — Cara a cara VS</div>

  <div class="clockwrap"><span class="live"></span><span class="clock" id="clock">00'</span></div>

  <div class="stage">
    <div class="side">
      <svg class="crest" viewBox="0 0 100 112"><defs><linearGradient id="gh" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#bdf7d3"/><stop offset="1" stop-color="#12a355"/></linearGradient></defs>
        <path d="M50 3 L94 19 V57 C94 85 74 102 50 109 C26 102 6 85 6 57 V19 Z" fill="rgba(9,20,14,.94)" stroke="url(#gh)" stroke-width="3.5" stroke-linejoin="round"/>
        <text x="50" y="56" text-anchor="middle" font-size="36" font-weight="800" fill="url(#gh)">U</text></svg>
      <div class="tname">ULTIME FC</div>
      <div class="rating">MEDIA <b>78</b></div>
      <div class="goals lgoals" id="gl">0</div>
    </div>

    <div class="mid">
      <div class="tsub">Jornada 7</div>
      <div class="vs"><span>VS</span></div>
      <div class="tsub">La Liga</div>
    </div>

    <div class="side">
      <svg class="crest" viewBox="0 0 100 112"><defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffd9a8"/><stop offset="1" stop-color="#c2410c"/></linearGradient></defs>
        <path d="M50 3 L94 19 V57 C94 85 74 102 50 109 C26 102 6 85 6 57 V19 Z" fill="rgba(20,10,6,.94)" stroke="url(#ga)" stroke-width="3.5" stroke-linejoin="round"/>
        <text x="50" y="56" text-anchor="middle" font-size="36" font-weight="800" fill="url(#ga)">R</text></svg>
      <div class="tname">REAL CF</div>
      <div class="rating">MEDIA <b>81</b></div>
      <div class="goals rgoals" id="gv">0</div>
    </div>
  </div>

<script>
  let min=0, gl=0, gv=0;
  const goles=[{m:18,t:'l'},{m:37,t:'v'},{m:64,t:'l'},{m:80,t:'v'}];
  const $=id=>document.getElementById(id);
  const tick=setInterval(()=>{
    min++;
    $('clock').textContent=String(min).padStart(2,'0')+"'";
    const g=goles.find(g=>g.m===min);
    if(g){ const el=$(g.t==='l'?'gl':'gv'); if(g.t==='l')gl++;else gv++;
      el.textContent=g.t==='l'?gl:gv;
      el.animate([{transform:'scale(1.5)'},{transform:'scale(1)'}],{duration:400,easing:'ease-out'}); }
    if(min>=90){ clearInterval(tick); $('clock').textContent='FIN'; }
  },220);
</script>
</body>
</html>
