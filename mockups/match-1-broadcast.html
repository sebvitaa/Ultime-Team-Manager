<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Partido 1 · Marcador transmisión</title>
<style>
  :root{--verde:#2fe27a;--verde2:#12a355;--carbon:#0d1411;--fondo:#02060a;
        --texto:#f4f7f9;--gris:#8b98a2;--borde:rgba(255,255,255,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--texto);
    background:var(--fondo);overflow:hidden;display:flex;flex-direction:column;min-height:100dvh}

  /* Cancha de fondo (vertical, estilo app) */
  .pitch{position:fixed;inset:0;z-index:0;background:
    radial-gradient(60% 60% at 50% 42%,#0a2a1a,#06140d 55%,#02060a)}
  .lines{position:fixed;left:50%;top:52%;translate:-50% -50%;width:min(78vw,420px);
    aspect-ratio:68/105;z-index:0;border:2px solid rgba(47,226,122,.35);border-radius:8px;opacity:.8}
  .lines::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(47,226,122,.3)}
  .lines::after{content:"";position:absolute;left:50%;top:50%;translate:-50% -50%;
    width:34%;aspect-ratio:1;border:2px solid rgba(47,226,122,.3);border-radius:50%}
  .vig{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(75% 75% at 50% 40%,transparent 45%,rgba(1,5,3,.72))}

  /* Marcador superior tipo TV */
  .scorebar{position:relative;z-index:2;margin:16px auto 0;width:min(94vw,560px);
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
    background:linear-gradient(180deg,rgba(14,20,17,.92),rgba(8,11,9,.94));
    border:1px solid var(--borde);border-radius:18px;padding:12px 16px;
    box-shadow:0 20px 50px rgba(0,0,0,.55)}
  .team{display:flex;align-items:center;gap:10px;min-width:0}
  .team.right{flex-direction:row-reverse;text-align:right}
  .crest{width:40px;height:44px;flex:0 0 auto}
  .tname{font-weight:800;font-size:15px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tsub{font-size:10px;color:var(--gris);letter-spacing:.5px}
  .center{display:flex;flex-direction:column;align-items:center;gap:4px}
  .score{font-weight:900;font-size:34px;letter-spacing:2px;line-height:1;font-variant-numeric:tabular-nums}
  .score b{color:var(--verde)}
  .clockwrap{display:flex;align-items:center;gap:6px;background:rgba(47,226,122,.12);
    border:1px solid rgba(47,226,122,.3);border-radius:999px;padding:3px 10px}
  .live{width:7px;height:7px;border-radius:50%;background:#ff4d4d;box-shadow:0 0 8px #ff4d4d;
    animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}
  .clock{font-weight:800;font-size:13px;color:var(--verde);font-variant-numeric:tabular-nums;letter-spacing:1px}

  /* Barra de progreso de los 90' */
  .progress{position:relative;z-index:2;width:min(94vw,560px);margin:10px auto 0;height:4px;
    background:var(--borde);border-radius:2px;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--verde2),var(--verde));
    border-radius:2px}

  /* Ticker de eventos abajo */
  .spacer{flex:1}
  .ticker{position:relative;z-index:2;margin:0 auto 18px;width:min(94vw,560px);
    background:rgba(9,12,11,.86);border:1px solid var(--borde);border-radius:14px;
    padding:12px 14px;min-height:56px;display:flex;align-items:center;gap:10px}
  .ev-min{font-weight:800;color:var(--verde);font-size:13px;font-variant-numeric:tabular-nums;flex:0 0 auto}
  .ev-txt{font-size:13px;color:var(--texto)}
  .ev-ic{color:var(--verde)}
  .etq{position:fixed;top:12px;left:14px;z-index:3;font-size:10px;letter-spacing:2px;
    text-transform:uppercase;color:rgba(244,247,249,.4);font-weight:700}
</style>
</head>
<body>
  <div class="pitch"></div><div class="lines"></div><div class="vig"></div>
  <div class="etq">Partido 1 — Marcador transmisión</div>

  <div class="scorebar">
    <div class="team">
      <svg class="crest" viewBox="0 0 100 112"><defs><linearGradient id="gh" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#bdf7d3"/><stop offset="1" stop-color="#12a355"/></linearGradient></defs>
        <path d="M50 3 L94 19 V57 C94 85 74 102 50 109 C26 102 6 85 6 57 V19 Z" fill="rgba(9,20,14,.94)" stroke="url(#gh)" stroke-width="4" stroke-linejoin="round"/>
        <text x="50" y="55" text-anchor="middle" font-size="34" font-weight="800" fill="url(#gh)">U</text></svg>
      <div style="min-width:0"><div class="tname">ULTIME FC</div><div class="tsub">Local · Media 78</div></div>
    </div>
    <div class="center">
      <div class="score"><b id="gl">0</b> <span style="color:var(--gris)">–</span> <b id="gv" style="color:var(--texto)">0</b></div>
      <div class="clockwrap"><span class="live"></span><span class="clock" id="clock">00'</span></div>
    </div>
    <div class="team right">
      <svg class="crest" viewBox="0 0 100 112"><defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffd9a8"/><stop offset="1" stop-color="#c2410c"/></linearGradient></defs>
        <path d="M50 3 L94 19 V57 C94 85 74 102 50 109 C26 102 6 85 6 57 V19 Z" fill="rgba(20,10,6,.94)" stroke="url(#ga)" stroke-width="4" stroke-linejoin="round"/>
        <text x="50" y="55" text-anchor="middle" font-size="34" font-weight="800" fill="url(#ga)">R</text></svg>
      <div style="min-width:0"><div class="tname">REAL CF</div><div class="tsub">Visita · Media 81</div></div>
    </div>
  </div>
  <div class="progress"><i id="bar"></i></div>

  <div class="spacer"></div>
  <div class="ticker">
    <span class="ev-min" id="evmin">00'</span>
    <span class="ev-ic">●</span>
    <span class="ev-txt" id="evtxt">Comienza el partido en el Estadio Ultime.</span>
  </div>

<script>
  let min=0, gl=0, gv=0;
  const goles=[ {m:18,t:'l',txt:'¡GOL de ULTIME FC! Remate de Bellingham.'},
                {m:37,t:'v',txt:'¡GOL de REAL CF! Contragolpe letal.'},
                {m:64,t:'l',txt:'¡GOL de ULTIME FC! Cabezazo en el área.'},
                {m:80,t:'v',txt:'¡GOL de REAL CF! Empata sobre el final.'} ];
  const $=id=>document.getElementById(id);
  const tick=setInterval(()=>{
    min++;
    $('clock').textContent = String(min).padStart(2,'0')+"'";
    $('bar').style.width = (min/90*100)+'%';
    const g=goles.find(g=>g.m===min);
    if(g){ if(g.t==='l'){gl++;$('gl').textContent=gl;} else {gv++;$('gv').textContent=gv;}
      $('evmin').textContent=String(min).padStart(2,'0')+"'"; $('evtxt').textContent=g.txt; }
    if(min>=90){ clearInterval(tick); $('clock').textContent="FIN"; $('evtxt').textContent='Final del partido.'; }
  }, 220);
</script>
</body>
</html>
