<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup 4 · Neón TOTY</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#eaf6ff;
    overflow:hidden;display:grid;place-items:center;min-height:100dvh;background:#02040a}
  .fondo{position:fixed;inset:0;z-index:0;background:
    radial-gradient(60% 60% at 50% 45%,#062a4a 0%,#03101f 55%,#01040a 100%)}
  /* rejilla hexagonal / puntos que pulsan y se mueven */
  .hex{position:fixed;inset:-10%;z-index:1;opacity:.5;
    background-image:radial-gradient(rgba(56,189,248,.55) 1.4px,transparent 1.6px);
    background-size:34px 34px;animation:desliza 18s linear infinite,latido 4s ease-in-out infinite;
    mask-image:radial-gradient(75% 75% at 50% 50%,#000,transparent)}
  @keyframes desliza{to{background-position:340px 0}}
  @keyframes latido{0%,100%{opacity:.35}50%{opacity:.65}}

  /* Campo de fútbol en neón */
  .pitch{position:fixed;z-index:1;left:50%;top:50%;width:min(88vw,760px);aspect-ratio:16/10;
    translate:-50% -50%;border:2px solid rgba(56,189,248,.55);border-radius:6px;
    box-shadow:0 0 24px rgba(56,189,248,.35),0 0 60px rgba(56,189,248,.15) inset;
    opacity:.9}
  .pitch::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;
    translate:-50% 0;background:rgba(56,189,248,.5)}
  .pitch::after{content:"";position:absolute;left:50%;top:50%;width:26%;aspect-ratio:1;
    translate:-50% -50%;border:2px solid rgba(56,189,248,.5);border-radius:50%}
  .area{position:absolute;top:50%;width:16%;height:52%;translate:0 -50%;
    border:2px solid rgba(56,189,248,.45)}
  .area.izq{left:0;border-left:0}.area.der{right:0;border-right:0}
  /* barrido de luz que recorre el campo */
  .scan{position:fixed;z-index:1;left:50%;top:50%;width:min(88vw,760px);aspect-ratio:16/10;
    translate:-50% -50%;overflow:hidden;border-radius:6px}
  .scan::before{content:"";position:absolute;top:0;bottom:0;width:40%;
    background:linear-gradient(90deg,transparent,rgba(56,189,248,.28),transparent);
    animation:recorre 5s ease-in-out infinite}
  @keyframes recorre{0%{left:-40%}100%{left:100%}}

  .login{position:relative;z-index:2;width:min(92vw,380px);padding:34px 28px 26px;
    background:rgba(4,14,26,.55);border:1px solid rgba(56,189,248,.4);border-radius:20px;
    backdrop-filter:blur(14px) saturate(150%);
    box-shadow:0 0 40px rgba(56,189,248,.25),0 30px 80px rgba(0,0,0,.6);
    animation:subir .7s cubic-bezier(.2,.8,.2,1) both}
  @keyframes subir{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .marca{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px}
  .escudo{width:64px;height:64px;border-radius:16px;display:grid;place-items:center;font-size:32px;
    background:linear-gradient(145deg,#38bdf8,#0284c7);box-shadow:0 0 30px rgba(56,189,248,.6)}
  .titulo{font-weight:800;letter-spacing:3px;font-size:15px;text-transform:uppercase;text-align:center;
    text-shadow:0 0 14px rgba(56,189,248,.5)}
  .sub{font-size:11px;letter-spacing:3px;color:#38bdf8;font-weight:800;text-transform:uppercase}
  label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#93c9e8;margin:16px 0 6px}
  .in{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(56,189,248,.06);
    border:1px solid rgba(56,189,248,.25);border-radius:12px;transition:.2s}
  .in:focus-within{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.25),0 0 20px rgba(56,189,248,.3)}
  .in input{flex:1;border:0;background:transparent;color:#eaf6ff;font-size:15px;outline:0}
  .in input::placeholder{color:rgba(234,246,255,.35)}
  .ojo{cursor:pointer;color:#93c9e8}
  .btn{margin-top:24px;width:100%;padding:14px;border:0;border-radius:12px;cursor:pointer;
    font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:14px;color:#03101f;
    background:linear-gradient(145deg,#7dd3fc,#0ea5e9);box-shadow:0 0 30px rgba(56,189,248,.55);
    transition:transform .15s,box-shadow .15s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 0 42px rgba(56,189,248,.8)}
  .demo{margin-top:16px;text-align:center;font-size:11px;color:rgba(234,246,255,.4)}
  .etq{position:fixed;top:14px;left:16px;z-index:3;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:rgba(234,246,255,.5);font-weight:700}
</style>
</head>
<body>
  <div class="fondo"></div><div class="hex"></div>
  <div class="pitch"><span class="area izq"></span><span class="area der"></span></div>
  <div class="scan"></div>
  <div class="etq">Mockup 4 — Neón · TOTY</div>

  <form class="login" onsubmit="return false">
    <div class="marca">
      <div class="escudo">⚽</div>
      <div class="titulo">Ultime Team Manager</div>
      <div class="sub">Inicia sesión</div>
    </div>
    <label>Correo</label>
    <div class="in"><span>📧</span><input type="email" placeholder="tu@correo.com"></div>
    <label>Contraseña</label>
    <div class="in"><span>🔒</span><input id="p4" type="password" placeholder="••••••">
      <span class="ojo" onclick="t('p4')">👁</span></div>
    <button class="btn">Entrar</button>
    <div class="demo">Demo: demo@ultime.com / 123456</div>
  </form>

<script>
  function t(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password'}
</script>
</body>
</html>
