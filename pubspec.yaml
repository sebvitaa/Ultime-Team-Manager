name: ultime_team_manager
description: "Crea tu propio equipo de fútbol y gestiona tu plantilla con Ultime Team Manager. ¡Descubre la emoción de ser un manager virtual!"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2
dependencies:
  audioplayers: ^6.8.1
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  http: ^1.2.2
  supabase_flutter: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/data/squad.json
    - assets/sounds/music/intro.mp3